<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login &#9829</title>
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
        <div class="white-box">
            <div class="login-header">
                <h1>Přihlaste se do Gameholicure</h1>
            </div>
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Uživatelské jméno</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Heslo</label>
                    <div class="password-wrapper">
                        <input type="password" id="pswd" required autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility"></button>
                    </div>
                </div>
                <button type="button" class="login-btn" id="loginBtn">
                    <span class="btn-text">Přihlásit se</span>
                </button>
            </form>
            <div class="next-to">
                <p>Nemáte účet?</p>
                <p id= "reg" onclick="changePage('render/register.html')">Registrace</p>
            </div>
        </div>
    <script src="./login.js"></script>
</body>
</html>
