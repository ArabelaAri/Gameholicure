<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Výběr aplikací &#9829</title>
  <link rel="stylesheet" href="css/general.css">
  <link rel="stylesheet" href="css/selection.css">
</head>
<body>
<p>Zde si vyberte aplikace, které se budou sledovat. Výběr budete moci upravovat kdykoli později v nastavení účtu.</p>
<div id="box">
    <h1>Vaše aplikace</h1>
    <div id="apps-container">
    </div>
    <button id="save-apps-btn">Pokračovat</button>
</div>
<div id="myModal" class="modal">
  <div class="modal-content">
    <h2>Prosím zadejte poslední čas spuštění aplikace: </h2>
    <h3 id="appName"></h3>
    <label for="inputDate">Datum posledního spuštění:</label>
    <input type="date" id="inputDate" name="inputDate"><br><br>
    <label for="inputTime">Vyberte čas v hodinách a minutách(volitelné):</label>
    <input type="time" id="inputTime" name="inputTime"><br><br>
    <button id="saveAppDate">Pokračovat</button>
    <button id="stepBack">Zpět</button>
  </div>
</div>

<script src="select-apps.js"></script>

</body>
</html>
